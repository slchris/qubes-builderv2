# Gentoo template build config for Qubes R4.3 (slchris).
#
# Based on example-configs/gentoo.yml, changed to:
#   - qubes-release r4.3 (was r4.2)
#   - builder-gentoo pointed at slchris' fork (PR#13 fixes: fresh Gentoo key,
#     23.0 profile, local-tarball overlay) instead of the stale QubesOS one
#   - maintainer = the slchris signing key
#   - build gentoo-minimal first (validate the chain before xfce/gnome)
#
# The Qubes guest overlay itself is delivered to the build chroot as a LOCAL
# tarball by qubes-gentoo-template/scripts/deploy-to-builder.sh (the build qube
# has no GitHub); distribution.sh's OVERLAY_SOURCE=local unpacks it.

git:
  baseurl: https://github.com
  prefix: slchris/qubes-
  branch: main

backend-vmm: xen
debug: true
verbose: true
qubes-release: r4.3

template-root-size: "30G"

templates:
  - gentoo-minimal:
      dist: gentoo
      flavor: minimal
      timeout: 86400

components:
  - builder-gentoo:
      packages: False
      # Standalone builder-gentoo repo (repo root = build scripts, as builderv2
      # expects: sources/builder-gentoo/scripts/00_prepare.sh). The template repo
      # had them one dir too deep.
      url: https://github.com/slchris/qubes-builder-gentoo
      branch: main
      maintainers:
        # Chris Su (Veritas) <Chris@lesscrowds.org>
        - CCA190F75CEA7FAB8A49F00045D10727855239D3

executor:
  # Fedora ships podman; builderv2 supports it natively (PodmanClient). Gentoo
  # template build needs to mount /dev inside the (privileged) container for the
  # chroot — ROOTLESS podman can't (mount: permission denied), so point at the
  # ROOTFUL podman socket (systemctl enable --now podman.socket as root). The
  # user is added to a group that can read /run/podman/podman.sock.
  type: podman
  options:
    # Fully-qualified image name (localhost/...). podman stores a locally-built
    # `-t qubes-builder-fedora:latest` under the localhost/ registry; the libpod
    # API's GET /images/<name>/json with short-name-mode=enforcing can fail to
    # resolve the bare short name (podman.errors APIError), so name it in full.
    image: "localhost/qubes-builder-fedora:latest"
    base_url: "unix:///run/podman/podman.sock"

stages:
  - fetch
  - prep
  - build
