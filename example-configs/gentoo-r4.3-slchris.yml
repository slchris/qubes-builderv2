# Gentoo template build config for Qubes R4.3 (slchris).
#
# Based on example-configs/gentoo.yml, changed to:
#   - qubes-release r4.3 (was r4.2)
#   - builder-gentoo pointed at slchris' fork (PR#13 fixes: fresh Gentoo key,
#     23.0 profile, local-tarball overlay) instead of the stale QubesOS one
#   - maintainer = the slchris signing key
#   - build gentoo-minimal first (validate the chain before xfce/gnome)
#
# The Qubes guest overlay itself is delivered to the build chroot as a LOCAL
# tarball by qubes-gentoo-template/scripts/deploy-to-builder.sh (the build qube
# has no GitHub); distribution.sh's OVERLAY_SOURCE=local unpacks it.

git:
  baseurl: https://github.com
  prefix: slchris/qubes-
  branch: main

backend-vmm: xen
debug: true
verbose: true
qubes-release: r4.3

template-root-size: "30G"

templates:
  - gentoo-minimal:
      dist: gentoo
      flavor: minimal
      timeout: 86400

components:
  - builder-gentoo:
      packages: False
      url: https://github.com/slchris/qubes-gentoo-template
      # the build scripts live under builder-gentoo/ in the template repo
      branch: main
      maintainers:
        # Chris Su (Veritas) <Chris@lesscrowds.org>
        - CCA190F75CEA7FAB8A49F00045D10727855239D3

executor:
  # Fedora ships podman (rootless), not docker. builderv2 supports it natively:
  # executor type 'podman' uses PodmanClient. base_url points at the rootless
  # podman socket (systemctl --user enable --now podman.socket).
  type: podman
  options:
    image: "qubes-builder-fedora:latest"
    base_url: "unix:///run/user/1000/podman/podman.sock"

stages:
  - fetch
  - prep
  - build
